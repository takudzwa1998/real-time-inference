global:
  scrape_interval:     15s   # how often to scrape targets
  evaluation_interval: 15s   # how often to evaluate alerting rules
  scrape_timeout:      10s

  external_labels:
    project: "real-time-inference"
    environment: "dev"

# ── Alerting rules ────────────────────────────────────────
# Uncomment and add rule files in Phase 5
# rule_files:
#   - /etc/prometheus/rules/*.yml

# ── Scrape targets ────────────────────────────────────────
scrape_configs:

  # Prometheus itself
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  # Inference service — camera FPS, queue depth, inference latency
  - job_name: inference
    metrics_path: /metrics
    static_configs:
      - targets: ["inference:8001"]
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: inference

  # Consumer service — detections persisted, alert events, RabbitMQ publish errors
  - job_name: consumer
    metrics_path: /metrics
    static_configs:
      - targets: ["consumer:8002"]
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: consumer

  # API gateway — HTTP request latency, active WebSocket connections
  - job_name: api
    metrics_path: /metrics
    static_configs:
      - targets: ["api:8000"]
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: api

  # RabbitMQ — queue depths, publish/deliver rates via the Prometheus plugin
  # The management plugin exposes Prometheus metrics at /metrics when the
  # rabbitmq_prometheus plugin is enabled (bundled in rabbitmq:3.x-management).
  - job_name: rabbitmq
    metrics_path: /metrics
    static_configs:
      - targets: ["rabbitmq:15692"]
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: rabbitmq

  # PostgreSQL — optional; requires postgres_exporter sidecar (add in Phase 5)
  # - job_name: postgres
  #   static_configs:
  #     - targets: ["postgres-exporter:9187"]
