## RabbitMQ configuration
## Docs: https://www.rabbitmq.com/configure.html

# ── Management plugin ────────────────────────────────────
management.listener.port = 15672
management.listener.ssl  = false

# ── Load topology definitions on first boot ──────────────
# The definitions file seeds exchanges, queues, and bindings.
# On subsequent starts RabbitMQ loads state from its Mnesia store;
# the file is only re-applied when the node is fresh.
load_definitions = /etc/rabbitmq/definitions.json

# ── Memory and disk alarms ───────────────────────────────
# Block publishers when >40 % of RAM is used by the broker
vm_memory_high_watermark.relative = 0.40
# Block publishers when disk free drops below 500 MB
disk_free_limit.absolute = 500MB

# ── Message store / persistence ──────────────────────────
# Force durable messages to disk synchronously for safety
queue_index_embed_msgs_below = 4096

# ── Logging ──────────────────────────────────────────────
log.console      = true
log.console.level = info
log.file         = false

# ── Heartbeat / connection tuning ───────────────────────
heartbeat = 60
tcp_listen_options.backlog    = 128
tcp_listen_options.nodelay    = true
tcp_listen_options.sndbuf     = 32768
tcp_listen_options.recbuf     = 32768
